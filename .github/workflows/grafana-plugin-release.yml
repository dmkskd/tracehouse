name: Grafana Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux optional dependencies
        run: |
          rm -f package-lock.json
          npm install --include=optional

      - name: Provide root changelog for Grafana action
        run: cp grafana-app-plugin/CHANGELOG.md CHANGELOG.md

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          node-version: "22"
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          attestation: true
