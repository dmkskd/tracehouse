name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Run tests before building ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2

      - run: rm -f package-lock.json
      - run: just install
      - run: just test-frontend
      - run: just test-core

  # ── Build the single-file HTML (platform-independent) ────────
  html:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2

      - run: rm -f package-lock.json
      - run: just install
      - run: just build-single

      - uses: actions/upload-artifact@v4
        with:
          name: tracehouse-html
          path: frontend/dist/tracehouse.html

  # ── Build Grafana plugin ─────────────────────────────────────
  grafana-plugin:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create/update the draft GitHub release
      id-token: write       # mint the OIDC token for Sigstore signing
      attestations: write   # write the build provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux optional dependencies
        run: |
          rm -f package-lock.json
          npm install --include=optional

      - name: Provide root changelog for Grafana action
        run: cp grafana-app-plugin/CHANGELOG.md CHANGELOG.md

      - id: build_plugin
        uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          node-version: "22"
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          attestation: true

      - name: Verify plugin build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify "${{ steps.build_plugin.outputs.archive }}" --repo "${{ github.repository }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dmkskd-tracehouse-app
          path: |
            ${{ steps.build_plugin.outputs.archive }}
            ${{ steps.build_plugin.outputs.archive-sha1sum }}

      - name: Grafana submission summary
        run: |
          ARCHIVE="${{ steps.build_plugin.outputs.archive }}"
          SHA1="${{ steps.build_plugin.outputs.archive-sha1sum }}"
          {
            echo "### Grafana plugin submission"
            echo ""
            echo "Use these release assets for grafana.com submission. Do not submit a locally built ZIP."
            echo ""
            echo "- Plugin URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$ARCHIVE")"
            echo "- SHA1 URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$SHA1")"
            echo "- Source code URL: https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build Rust binaries for each platform ────────────────────
  binary:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tracehouse-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tracehouse-aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tracehouse-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - run: rm -f package-lock.json
      - run: just install
      - name: Build frontend for binary embedding
        run: just dist-binary-frontend
      - name: Build binary
        run: cd infra/binary && cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp infra/binary/target/${{ matrix.target }}/release/tracehouse release/${{ matrix.artifact }}/tracehouse
          cd release && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ── Upload all artifacts to the GitHub release ───────────────
  upload:
    needs: [html, binary, grafana-plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/tracehouse-html/tracehouse.html \
            artifacts/tracehouse-x86_64-unknown-linux-gnu/tracehouse-x86_64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-unknown-linux-gnu/tracehouse-aarch64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-apple-darwin/tracehouse-aarch64-apple-darwin.tar.gz \
            --repo "${{ github.repository }}"
