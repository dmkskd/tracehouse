name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Run tests before building ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2

      - run: rm -f package-lock.json
      - run: just install
      - run: just test-frontend
      - run: just test-core

  # ── Build the single-file HTML (platform-independent) ────────
  html:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2

      - run: rm -f package-lock.json
      - run: just install
      - run: just build-single

      - uses: actions/upload-artifact@v4
        with:
          name: tracehouse-html
          path: frontend/dist/tracehouse.html

  # ── Build Grafana plugin ─────────────────────────────────────
  grafana-plugin:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # mint the OIDC token for provenance attestation
      attestations: write   # write the build provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2

      - run: rm -f package-lock.json
      - run: just install
      - run: just grafana-plugin-build

      - name: Sign Grafana plugin
        working-directory: grafana-app-plugin
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
        run: |
          if [ -z "${GRAFANA_ACCESS_POLICY_TOKEN:-}" ]; then
            echo "GRAFANA_ACCESS_POLICY_TOKEN is not set; leaving plugin unsigned."
            exit 0
          fi
          npx @grafana/sign-plugin@latest

      - name: Package plugin
        id: package_plugin
        run: |
          PLUGIN_ID=$(node -p "require('./grafana-app-plugin/dist/plugin.json').id")
          PLUGIN_VERSION=$(node -p "require('./grafana-app-plugin/dist/plugin.json').info.version")
          PLUGIN_ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"
          PLUGIN_SHA1="${PLUGIN_ARCHIVE}.sha1"

          mkdir -p "release/${PLUGIN_ID}"
          cp -r grafana-app-plugin/dist/* "release/${PLUGIN_ID}/"
          cd release
          zip -qr "${PLUGIN_ARCHIVE}" "${PLUGIN_ID}"
          sha1sum "${PLUGIN_ARCHIVE}" | cut -f1 -d' ' > "${PLUGIN_SHA1}"

          echo "archive=release/${PLUGIN_ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "archive_sha1=release/${PLUGIN_SHA1}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${PLUGIN_ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "archive_sha1_name=${PLUGIN_SHA1}" >> "$GITHUB_OUTPUT"

      - name: Attest plugin build provenance
        id: attest_plugin
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.package_plugin.outputs.archive }}

      - name: Verify plugin build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify "${{ steps.package_plugin.outputs.archive }}" --repo "${{ github.repository }}"

      - name: Package plugin source
        id: package_plugin_source
        run: |
          bash grafana-app-plugin/scripts/package-source.sh release/dmkskd-tracehouse-app-source.zip
          echo "source_archive=release/dmkskd-tracehouse-app-source.zip" >> "$GITHUB_OUTPUT"
          echo "source_archive_name=dmkskd-tracehouse-app-source.zip" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dmkskd-tracehouse-app
          path: |
            ${{ steps.package_plugin.outputs.archive }}
            ${{ steps.package_plugin.outputs.archive_sha1 }}

      - uses: actions/upload-artifact@v4
        with:
          name: dmkskd-tracehouse-app-source
          path: ${{ steps.package_plugin_source.outputs.source_archive }}

      - name: Grafana submission summary
        run: |
          {
            echo "### Grafana plugin submission"
            echo ""
            echo "Use these release assets for grafana.com submission. Do not submit a locally built ZIP."
            echo ""
            echo "- Plugin URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package_plugin.outputs.archive_name }}"
            echo "- SHA1 URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package_plugin.outputs.archive_sha1_name }}"
            echo "- Source ZIP URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package_plugin_source.outputs.source_archive_name }}"
            echo "- Attestation: ${{ steps.attest_plugin.outputs.attestation-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build Rust binaries for each platform ────────────────────
  binary:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tracehouse-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tracehouse-aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tracehouse-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - run: rm -f package-lock.json
      - run: just install
      - name: Build frontend for binary embedding
        run: just dist-binary-frontend
      - name: Build binary
        run: cd infra/binary && cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp infra/binary/target/${{ matrix.target }}/release/tracehouse release/${{ matrix.artifact }}/tracehouse
          cd release && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ── Upload all artifacts to the GitHub release ───────────────
  upload:
    needs: [html, binary, grafana-plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists."
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --draft
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/tracehouse-html/tracehouse.html \
            artifacts/tracehouse-x86_64-unknown-linux-gnu/tracehouse-x86_64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-unknown-linux-gnu/tracehouse-aarch64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-apple-darwin/tracehouse-aarch64-apple-darwin.tar.gz \
            artifacts/dmkskd-tracehouse-app/dmkskd-tracehouse-app-*.zip \
            artifacts/dmkskd-tracehouse-app/dmkskd-tracehouse-app-*.zip.sha1 \
            artifacts/dmkskd-tracehouse-app-source/dmkskd-tracehouse-app-source.zip \
            --repo "${{ github.repository }}"
