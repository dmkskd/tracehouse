name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Leave empty for a dry run."
        required: false

permissions:
  contents: write

jobs:
  # ── Run tests before building ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
          npm run build --workspace=packages/core
          npm run build --workspace=packages/ui-shared

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Run core tests
        run: cd packages/core && npx vitest run

  # ── Build the single-file HTML (platform-independent) ────────
  html:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
          npm run build --workspace=packages/core
          npm run build --workspace=packages/ui-shared

      - name: Build single-file HTML
        run: cd frontend && npm run build:single

      - uses: actions/upload-artifact@v4
        with:
          name: tracehouse-html
          path: frontend/dist/tracehouse.html

  # ── Build Grafana plugin ─────────────────────────────────────
  grafana-plugin:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
          npm run build --workspace=packages/core
          npm run build --workspace=packages/ui-shared

      - name: Build Grafana plugin
        run: |
          cd grafana-app-plugin && npm install && npm run build

      - name: Package plugin
        run: |
          mkdir -p release/dmkskd-tracehouse-app
          cp -r grafana-app-plugin/dist/* release/dmkskd-tracehouse-app/
          cd release && zip -r dmkskd-tracehouse-app.zip dmkskd-tracehouse-app

      - uses: actions/upload-artifact@v4
        with:
          name: dmkskd-tracehouse-app
          path: release/dmkskd-tracehouse-app.zip

  # ── Build Rust binaries for each platform ────────────────────
  binary:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tracehouse-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tracehouse-aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tracehouse-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install dependencies & build frontend
        run: |
          rm -f package-lock.json
          npm install
          npm run build --workspace=packages/core
          npm run build --workspace=packages/ui-shared
          cd frontend && VITE_BUNDLED_PROXY=true npx vite build --config vite.singlefile.config.ts

      - name: Build binary
        run: cd infra/binary && cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp infra/binary/target/${{ matrix.target }}/release/tracehouse release/${{ matrix.artifact }}/tracehouse
          cd release && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ── Upload all artifacts to the GitHub release ───────────────
  upload:
    needs: [html, binary, grafana-plugin]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/tracehouse-html/tracehouse.html \
            artifacts/tracehouse-x86_64-unknown-linux-gnu/tracehouse-x86_64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-unknown-linux-gnu/tracehouse-aarch64-unknown-linux-gnu.tar.gz \
            artifacts/tracehouse-aarch64-apple-darwin/tracehouse-aarch64-apple-darwin.tar.gz \
            artifacts/dmkskd-tracehouse-app/dmkskd-tracehouse-app.zip \
            --repo "${{ github.repository }}"
