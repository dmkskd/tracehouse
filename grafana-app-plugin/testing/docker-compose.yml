services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.3}
    pull_policy: always
    ports:
      - "${GRAFANA_TEST_PORT:-3003}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DEFAULT_APP_MODE: development
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: dmkskd-tracehouse-app
      GF_INSTALL_PLUGINS: ${GRAFANA_INSTALL_PLUGINS:-grafana-clickhouse-datasource}
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - ${GRAFANA_PLUGIN_TEST_DIST:-./plugin-dist}:/var/lib/grafana/plugins
    env_file:
      - path: ./.env
        required: false
    depends_on:
      clickhouse:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    pull_policy: always
    ports:
      - "${CLICKHOUSE_TEST_HTTP_PORT:-8124}:8123"
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
