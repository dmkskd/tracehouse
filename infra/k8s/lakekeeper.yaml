# Lakekeeper — Iceberg REST catalog backed by PostgreSQL
# Provides catalog discovery for ClickHouse IcebergS3 tables via MinIO
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lakekeeper-db-data
  namespace: clickhouse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakekeeper-db
  namespace: clickhouse
  labels:
    app: lakekeeper-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakekeeper-db
  template:
    metadata:
      labels:
        app: lakekeeper-db
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: "lakekeeper"
            - name: POSTGRES_PASSWORD
              value: "lakekeeper"
            - name: POSTGRES_DB
              value: "lakekeeper"
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lakekeeper", "-d", "lakekeeper"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "lakekeeper", "-d", "lakekeeper"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lakekeeper-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: lakekeeper-db
  namespace: clickhouse
spec:
  selector:
    app: lakekeeper-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Migration job — runs once to set up the Lakekeeper schema
apiVersion: batch/v1
kind: Job
metadata:
  name: lakekeeper-migrate
  namespace: clickhouse
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z lakekeeper-db 5432; do sleep 2; done"]
      containers:
        - name: migrate
          image: quay.io/lakekeeper/catalog:latest
          args: ["migrate"]
          env:
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "tracehouse-k8s-key"
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper"
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakekeeper
  namespace: clickhouse
  labels:
    app: lakekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakekeeper
  template:
    metadata:
      labels:
        app: lakekeeper
    spec:
      containers:
        - name: lakekeeper
          image: quay.io/lakekeeper/catalog:latest
          args: ["serve"]
          env:
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "tracehouse-k8s-key"
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper"
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper"
            - name: LAKEKEEPER__LISTEN_PORT
              value: "8181"
            - name: RUST_LOG
              value: "info"
          ports:
            - containerPort: 8181
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lakekeeper
  namespace: clickhouse
spec:
  selector:
    app: lakekeeper
  ports:
    - name: http
      port: 8181
      targetPort: 8181
---
# ConfigMap for the warehouse creation payload
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakekeeper-warehouse-config
  namespace: clickhouse
data:
  create-warehouse.json: |
    {
      "warehouse-name": "tracehouse",
      "project-id": "00000000-0000-0000-0000-000000000000",
      "storage-profile": {
        "type": "s3",
        "bucket": "iceberg-warehouse",
        "key-prefix": "tracehouse",
        "endpoint": "http://minio:9000",
        "region": "us-east-1",
        "path-style-access": true,
        "flavor": "minio",
        "sts-enabled": true
      },
      "storage-credential": {
        "type": "s3",
        "credential-type": "access-key",
        "access-key-id": "clickhouse",
        "secret-access-key": "clickhouse_secret"
      }
    }
---
# Bootstrap + warehouse init job (runs after Lakekeeper is ready)
apiVersion: batch/v1
kind: Job
metadata:
  name: lakekeeper-init
  namespace: clickhouse
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-lakekeeper
          image: busybox:1.36
          command: ["sh", "-c", "until wget -qO- http://lakekeeper:8181/health; do sleep 2; done"]
      containers:
        - name: init
          image: curlimages/curl
          command:
            - /bin/sh
            - -c
            - |
              curl -sf -X POST http://lakekeeper:8181/management/v1/bootstrap \
                -H 'Content-Type: application/json' \
                -d '{"accept-terms-of-use": true}' \
                -o /dev/null -w '%{http_code}\n'
              curl -sf -X POST http://lakekeeper:8181/management/v1/warehouse \
                -H 'Content-Type: application/json' \
                -d @/config/create-warehouse.json \
                -o /dev/null -w '%{http_code}\n'
          volumeMounts:
            - name: warehouse-config
              mountPath: /config
      volumes:
        - name: warehouse-config
          configMap:
            name: lakekeeper-warehouse-config
