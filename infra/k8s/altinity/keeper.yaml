# ClickHouse Keeper for Altinity operator setup
# Uses the ClickHouseKeeperInstallation CRD provided by the Altinity operator
# Single replica for development — use 3+ for production
apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: dev-keeper
  namespace: clickhouse
spec:
  configuration:
    clusters:
      - name: "keeper"
        layout:
          replicasCount: 1
  defaults:
    templates:
      podTemplate: default
      volumeClaimTemplate: keeper-storage
  templates:
    podTemplates:
      - name: default
        metadata:
          labels:
            app: dev-keeper
        spec:
          containers:
            - name: clickhouse-keeper
              imagePullPolicy: IfNotPresent
              image: "clickhouse/clickhouse-keeper:26.1"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          securityContext:
            fsGroup: 101
    volumeClaimTemplates:
      - name: keeper-storage
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
