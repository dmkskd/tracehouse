# Kind cluster configuration for altinity-large (4 shards × 2 replicas)
# 1 control-plane + 8 workers

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tracehouse-dev
nodes:
  - role: control-plane
    extraPortMappings:
      # ClickHouse native protocol
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
      # ClickHouse HTTP interface
      - containerPort: 30123
        hostPort: 8123
        protocol: TCP
      # ClickHouse HTTPS interface
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
      # Grafana
      - containerPort: 30301
        hostPort: 3001
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
  - role: worker
    labels:
      clickhouse-node: "1"
  - role: worker
    labels:
      clickhouse-node: "2"
  - role: worker
    labels:
      clickhouse-node: "3"
  - role: worker
    labels:
      clickhouse-node: "4"
  - role: worker
    labels:
      clickhouse-node: "5"
  - role: worker
    labels:
      clickhouse-node: "6"
  - role: worker
    labels:
      clickhouse-node: "7"
  - role: worker
    labels:
      clickhouse-node: "8"
