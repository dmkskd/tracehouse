# ClickHouse cluster for development
# 2 shards, 2 replicas each — one pod per Kind worker node
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: dev-cluster
  namespace: clickhouse
spec:
  replicas: 2
  shards: 2

  # Reference to Keeper cluster
  keeperClusterRef:
    name: dev-keeper

  # Persistent storage
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 40Gi

  # Container configuration
  containerTemplate:
    image:
      repository: clickhouse/clickhouse-server
      tag: "26.1"
    resources:
      requests:
        memory: "8Gi"
        cpu: "2"
      limits:
        memory: "12Gi"
        cpu: "3"

  # Spread replicas across worker nodes
  podTemplate:
    securityContext:
      # Ensure the clickhouse user (101) can write to the data volume,
      # including creating disks/s3 and disks/s3_cache subdirectories
      fsGroup: 101
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: clickhouse
            topologyKey: kubernetes.io/hostname

  settings:
    tls:
      enabled: true
      serverCertSecret:
        name: clickhouse-tls
    extraConfig:
      # Disable client certificate requirement (server TLS only, no mTLS)
      openSSL:
        server:
          verificationMode: none
          loadDefaultCAFile: false
      # S3 tiered storage via MinIO
      # Disk names chosen so s3 sorts before s3cache (cache depends on s3)
      storage_configuration:
        disks:
          s3:
            type: s3
            endpoint: http://minio:9000/clickhouse/{shard}/{replica}/data/
            access_key_id: clickhouse
            secret_access_key: clickhouse_secret
            metadata_path: /var/lib/clickhouse/disks/s3/
          s3cache:
            type: cache
            disk: s3
            path: /var/lib/clickhouse/disks/s3_cache/
            max_size: 1Gi
        policies:
          s3tiered:
            volumes:
              default:
                disk: default
              s3cached:
                disk: s3cache
          s3only:
            volumes:
              main:
                disk: s3cache
      # System log tables
      query_log:
        database: system
        table: query_log
        flush_interval_milliseconds: 7500
      query_thread_log:
        database: system
        table: query_thread_log
        flush_interval_milliseconds: 7500
      part_log:
        database: system
        table: part_log
        flush_interval_milliseconds: 7500
      text_log:
        database: system
        table: text_log
        flush_interval_milliseconds: 7500
      trace_log:
        database: system
        table: trace_log
        flush_interval_milliseconds: 7500
      metric_log:
        database: system
        table: metric_log
        collect_interval_milliseconds: 1000
      asynchronous_metric_log:
        database: system
        table: asynchronous_metric_log
        flush_interval_milliseconds: 7500
      crash_log:
        database: system
        table: crash_log
        flush_interval_milliseconds: 7500
      processors_profile_log:
        database: system
        table: processors_profile_log
        flush_interval_milliseconds: 7500
      opentelemetry_span_log:
        database: system
        table: opentelemetry_span_log
        flush_interval_milliseconds: 7500
      # User profile settings
      profiles:
        default:
          opentelemetry_start_trace_probability: 1
          opentelemetry_trace_processors: 1
          allow_introspection_functions: 1
          query_profiler_cpu_time_period_ns: 10000000
          query_profiler_real_time_period_ns: 10000000
          memory_profiler_step: 1048576
          log_processors_profiles: 1
      # CORS
      http_options_response:
        header:
          - name: Access-Control-Allow-Origin
            value: "*"
          - name: Access-Control-Allow-Headers
            value: "origin, x-requested-with, x-clickhouse-format, x-clickhouse-user, x-clickhouse-key, content-type, authorization"
          - name: Access-Control-Allow-Methods
            value: "POST, GET, OPTIONS"
          - name: Access-Control-Max-Age
            value: "86400"
      http_handlers:
        rule:
          handler:
            type: dynamic_query_handler
            query_param_name: query
            http_response_headers:
              Access-Control-Allow-Origin: "*"
        defaults: true
---
# NodePort service to expose ClickHouse on fixed ports
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-external
  namespace: clickhouse
spec:
  type: NodePort
  selector:
    app: dev-cluster-clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: 30123
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
    - name: prometheus
      port: 9363
      targetPort: 9363
      nodePort: 30363
