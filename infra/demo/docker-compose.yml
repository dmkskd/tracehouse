# TraceHouse — Demo Environment (2 shards × 2 replicas)
#
# Deploys a 4-node ClickHouse cluster with ClickHouse Keeper,
# MinIO (S3 storage), Grafana, and Caddy (reverse proxy).
#
# Prerequisites:
#   1. Run ./setup.sh to generate .env with passwords
#   2. (Optional) Set CH_DOMAIN / GRAFANA_DOMAIN for automatic TLS
#
# Usage:
#   ./setup.sh            # generate passwords
#   docker compose up -d  # start everything
#
# Exposed ports:
#   80   — Frontend (TraceHouse UI)
#   8443 — ClickHouse HTTPS (load-balanced across all nodes)
#   8123 — ClickHouse HTTP  (temporary, load-balanced)
#   3000 — Grafana

services:
  # ─── ClickHouse Keeper (single node, sufficient for demo) ─────────────────

  keeper:
    image: clickhouse/clickhouse-keeper:latest
    container_name: tracehouse-demo-keeper
    volumes:
      - ./keeper/keeper1.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - tracehouse-keeper-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 -q 'ls /'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── MinIO — S3-compatible object storage ────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: tracehouse-demo-minio
    volumes:
      - tracehouse-minio-data:/data
    environment:
      MINIO_ROOT_USER: clickhouse
      MINIO_ROOT_PASSWORD: clickhouse_secret
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: tracehouse-demo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 clickhouse clickhouse_secret;
      mc mb --ignore-existing local/clickhouse;
      exit 0;
      "

  # ─── ClickHouse nodes (2 shards × 2 replicas) ───────────────────────────

  ch-s1r1:
    image: clickhouse:26.3
    container_name: tracehouse-demo-ch-s1r1
    environment:
      TH_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD:?Run ./setup.sh first}
      CLICKHOUSE_READONLY_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
      CH_SHARD: "01"
      CH_REPLICA: s1r1
    volumes:
      # Data
      - tracehouse-ch-s1r1-data:/var/lib/clickhouse
      - tracehouse-ch-s1r1-logs:/var/log/clickhouse-server
      # Shared server config
      - ../docker/clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ../docker/clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ../docker/clickhouse-config/query_thread_log.xml:/etc/clickhouse-server/config.d/query_thread_log.xml:ro
      - ../docker/clickhouse-config/text_log.xml:/etc/clickhouse-server/config.d/text_log.xml:ro
      - ../docker/clickhouse-config/system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml:ro
      # Cluster config
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse-cluster/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./clickhouse-cluster/s3_storage.xml:/etc/clickhouse-server/config.d/s3_storage.xml:ro
      # User config
      - ./clickhouse-users:/etc/clickhouse-server/users.d
    networks:
      default:
        aliases:
          - clickhouse   # Grafana datasource compatibility
    depends_on:
      keeper: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  ch-s1r2:
    image: clickhouse:26.3
    container_name: tracehouse-demo-ch-s1r2
    environment:
      TH_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD}
      CLICKHOUSE_READONLY_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
      CH_SHARD: "01"
      CH_REPLICA: s1r2
    volumes:
      - tracehouse-ch-s1r2-data:/var/lib/clickhouse
      - tracehouse-ch-s1r2-logs:/var/log/clickhouse-server
      - ../docker/clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ../docker/clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ../docker/clickhouse-config/query_thread_log.xml:/etc/clickhouse-server/config.d/query_thread_log.xml:ro
      - ../docker/clickhouse-config/text_log.xml:/etc/clickhouse-server/config.d/text_log.xml:ro
      - ../docker/clickhouse-config/system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml:ro
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse-cluster/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./clickhouse-cluster/s3_storage.xml:/etc/clickhouse-server/config.d/s3_storage.xml:ro
      - ./clickhouse-users:/etc/clickhouse-server/users.d
    depends_on:
      keeper: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  ch-s2r1:
    image: clickhouse:26.3
    container_name: tracehouse-demo-ch-s2r1
    environment:
      TH_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD}
      CLICKHOUSE_READONLY_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
      CH_SHARD: "02"
      CH_REPLICA: s2r1
    volumes:
      - tracehouse-ch-s2r1-data:/var/lib/clickhouse
      - tracehouse-ch-s2r1-logs:/var/log/clickhouse-server
      - ../docker/clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ../docker/clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ../docker/clickhouse-config/query_thread_log.xml:/etc/clickhouse-server/config.d/query_thread_log.xml:ro
      - ../docker/clickhouse-config/text_log.xml:/etc/clickhouse-server/config.d/text_log.xml:ro
      - ../docker/clickhouse-config/system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml:ro
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse-cluster/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./clickhouse-cluster/s3_storage.xml:/etc/clickhouse-server/config.d/s3_storage.xml:ro
      - ./clickhouse-users:/etc/clickhouse-server/users.d
    depends_on:
      keeper: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  ch-s2r2:
    image: clickhouse:26.3
    container_name: tracehouse-demo-ch-s2r2
    environment:
      TH_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD}
      CLICKHOUSE_READONLY_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
      CH_SHARD: "02"
      CH_REPLICA: s2r2
    volumes:
      - tracehouse-ch-s2r2-data:/var/lib/clickhouse
      - tracehouse-ch-s2r2-logs:/var/log/clickhouse-server
      - ../docker/clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ../docker/clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ../docker/clickhouse-config/query_thread_log.xml:/etc/clickhouse-server/config.d/query_thread_log.xml:ro
      - ../docker/clickhouse-config/text_log.xml:/etc/clickhouse-server/config.d/text_log.xml:ro
      - ../docker/clickhouse-config/system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml:ro
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse-cluster/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./clickhouse-cluster/s3_storage.xml:/etc/clickhouse-server/config.d/s3_storage.xml:ro
      - ./clickhouse-users:/etc/clickhouse-server/users.d
    depends_on:
      keeper: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─── Init services (run once after cluster is healthy) ───────────────────

  sampling-init:
    image: clickhouse:latest
    container_name: tracehouse-demo-sampling-init
    depends_on:
      ch-s1r1: { condition: service_healthy }
      ch-s1r2: { condition: service_healthy }
      ch-s2r1: { condition: service_healthy }
      ch-s2r2: { condition: service_healthy }
    volumes:
      - ../scripts/setup_sampling.sh:/setup_sampling.sh:ro
    entrypoint:
      - /bin/bash
      - /setup_sampling.sh
      - --host
      - ch-s1r1
      - --password
      - ${CLICKHOUSE_DEFAULT_PASSWORD}
      - --secure
      - "no"
      - --cluster
      - tracehouse
      - --yes

  # ─── Workload generator (data + queries + mutations, cyclic) ─────────────

  workload:
    build:
      context: ../../tools/data-utils
      dockerfile: Dockerfile
    container_name: tracehouse-demo-workload
    entrypoint: ["/bin/bash", "/workload-loop.sh"]
    volumes:
      - ./workload-loop.sh:/workload-loop.sh:ro
    environment:
      CH_HOST: ch-s1r1
      CH_PORT: "9000"
      CH_USER: default
      CH_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD}
      CH_CLUSTER: tracehouse
      CH_ASSUME_YES: "1"
      # Pre-created test users (same password as default, defined in workload-users.xml)
      TRACEHOUSE_TEST_USERS: "{\"th_alice\":\"${CLICKHOUSE_DEFAULT_PASSWORD}\",\"th_bob\":\"${CLICKHOUSE_DEFAULT_PASSWORD}\",\"th_carol\":\"${CLICKHOUSE_DEFAULT_PASSWORD}\",\"th_dave\":\"${CLICKHOUSE_DEFAULT_PASSWORD}\",\"th_eve\":\"${CLICKHOUSE_DEFAULT_PASSWORD}\"}"
      # Generate config
      CH_GEN_ROWS: "${WORKLOAD_ROWS:-500000}"
      CH_GEN_PARALLELISM: "${WORKLOAD_PARALLELISM:-2}"
      CH_GEN_BATCH_SIZE: "100000"
      CH_GEN_THROTTLE_MIN: "2.0"
      CH_GEN_THROTTLE_MAX: "4.0"
      CH_GEN_MODE: "resume"
      # Query config (throttled for 16GB server)
      CH_QUERY_SLOW_INTERVAL: "15"
      CH_QUERY_SLOW_WORKERS: "1"
      CH_QUERY_FAST_INTERVAL: "5"
      CH_QUERY_FAST_WORKERS: "1"
      CH_QUERY_S3_WORKERS: "0"
      CH_QUERY_PK_INTERVAL: "4"
      CH_QUERY_PK_WORKERS: "1"
      CH_QUERY_JOIN_INTERVAL: "10"
      CH_QUERY_JOIN_WORKERS: "1"
      CH_QUERY_SETTINGS_INTERVAL: "10"
      CH_QUERY_SETTINGS_WORKERS: "1"
      # Mutation config (sparse — mutations are a corner case)
      CH_MUTATION_COUNT: "5"
      CH_MUTATION_INTERVAL: "300"
      # Data tables have 12h TTL — no cycle/drop needed
      CH_GEN_TTL_HOURS: "12"
    depends_on:
      sampling-init: { condition: service_completed_successfully }
    restart: unless-stopped

  # ─── Frontend + CORS proxy ───────────────────────────────────────────────

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
      args:
        DEFAULT_CH_HOST: demo
        DEFAULT_CH_PORT: "8123"
        DEFAULT_CH_USER: read_only
        DEFAULT_CH_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
        DEFAULT_CH_SECURE: "false"
        DEFAULT_CH_CLUSTER: "tracehouse"
        AUTO_CONNECT: "true"
    container_name: tracehouse-demo-frontend
    environment:
      PROXY_PORT: "8990"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8990/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Caddy — reverse proxy / load balancer ──────────────────────────────

  caddy:
    image: caddy:latest
    container_name: tracehouse-demo-caddy
    ports:
      - "80:80"       # Frontend (HTTP)
      - "443:443"     # Frontend (HTTPS, if domain configured)
      - "8443:8443"   # ClickHouse HTTPS (TLS)
      - "8123:8123"   # ClickHouse HTTP  (temporary, remove when ready)
      - "3000:3000"   # Grafana
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - tracehouse-caddy-data:/data
      - tracehouse-caddy-config:/config
    networks:
      default:
        aliases:
          - demo   # friendly name for internal CH access (frontend proxy → demo:8123)
    depends_on:
      ch-s1r1: { condition: service_healthy }
      frontend: { condition: service_healthy }
    restart: unless-stopped

  # ─── Grafana plugin build (init container) ──────────────────────────────

  grafana-plugin-build:
    build:
      context: ../../
      dockerfile: grafana-app-plugin/Dockerfile
    container_name: tracehouse-demo-grafana-plugin-build
    volumes:
      - tracehouse-grafana-plugin:/output

  # ─── Grafana ─────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:12.3.2
    container_name: tracehouse-demo-grafana
    # No exposed ports — Caddy proxies 3000 → grafana:3000
    volumes:
      - tracehouse-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ../docker/grafana/dashboards:/var/lib/grafana/dashboards
      - tracehouse-grafana-plugin:/var/lib/grafana/plugins/tracehouse-app
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SERVER_HTTP_PORT: "3000"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: tracehouse-app
      CLICKHOUSE_READONLY_PASSWORD: ${CLICKHOUSE_READONLY_PASSWORD}
    depends_on:
      ch-s1r1: { condition: service_healthy }
      grafana-plugin-build: { condition: service_completed_successfully }
    restart: unless-stopped

volumes:
  # Keeper
  tracehouse-keeper-data:
  # MinIO
  tracehouse-minio-data:
  # ClickHouse nodes
  tracehouse-ch-s1r1-data:
  tracehouse-ch-s1r1-logs:
  tracehouse-ch-s1r2-data:
  tracehouse-ch-s1r2-logs:
  tracehouse-ch-s2r1-data:
  tracehouse-ch-s2r1-logs:
  tracehouse-ch-s2r2-data:
  tracehouse-ch-s2r2-logs:
  # Caddy
  tracehouse-caddy-data:
  tracehouse-caddy-config:
  # Grafana
  tracehouse-grafana-plugin:
  tracehouse-grafana-data:
